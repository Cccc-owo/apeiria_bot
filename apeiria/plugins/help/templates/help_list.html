<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; margin: 0; padding: 16px; background: #f5f5f5; }
  .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 16px 20px; border-radius: 8px 8px 0 0; }
  .header h1 { margin: 0; font-size: 20px; }
  .header .count { font-size: 13px; opacity: 0.8; margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 0 0 8px 8px; overflow: hidden; }
  th { background: #f0f0f0; padding: 10px 12px; text-align: left; font-size: 13px; color: #666; }
  td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 13px; }
  tr:last-child td { border-bottom: none; }
  .name { font-weight: 600; color: #333; white-space: nowrap; }
  .desc { color: #666; }
  .cmds code { background: #e8eaf6; color: #3f51b5; padding: 2px 6px; border-radius: 3px; font-size: 12px; margin-right: 4px; }
  .badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; color: white; margin-left: 4px; }
  .level-1, .level-2, .level-3, .level-4 { background: #ff9800; }
  .level-5 { background: #f44336; }
  .level-6 { background: #9c27b0; }
  .footer { text-align: center; color: #999; font-size: 11px; margin-top: 8px; }
</style>
</head>
<body>
  <div class="header">
    <h1>Apeiria Bot - 命令帮助</h1>
    <div class="count">共 {{count}} 个插件</div>
  </div>
  <table>
    <tr><th>插件</th><th>描述</th><th>命令</th></tr>
    {{rows}}
  </table>
  <div class="footer">使用 /help &lt;插件名&gt; 查看详情</div>
</body>
</html>

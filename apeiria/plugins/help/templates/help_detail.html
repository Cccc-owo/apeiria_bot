<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; margin: 0; padding: 16px; background: #f5f5f5; }
  .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .card-header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 16px 20px; }
  .card-header h1 { margin: 0; font-size: 20px; }
  .card-header .meta { font-size: 12px; opacity: 0.8; margin-top: 4px; }
  .card-body { padding: 16px 20px; }
  .section { margin-bottom: 14px; }
  .section-title { font-size: 13px; color: #999; margin-bottom: 4px; }
  .section-content { font-size: 14px; color: #333; line-height: 1.6; }
  .section-content code { background: #e8eaf6; color: #3f51b5; padding: 2px 6px; border-radius: 3px; font-size: 13px; }
  .section-content ul { margin: 4px 0; padding-left: 20px; }
  .section-content li { margin-bottom: 2px; }
  .tag { display: inline-block; background: #e0e0e0; color: #555; padding: 2px 8px; border-radius: 3px; font-size: 12px; margin-right: 6px; }
</style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>{{name}}</h1>
      <div class="meta">v{{version}} · {{type}} · 权限等级 {{level}}</div>
    </div>
    <div class="card-body">
      <div class="section">
        <div class="section-title">描述</div>
        <div class="section-content">{{description}}</div>
      </div>
      <div class="section">
        <div class="section-title">使用方法</div>
        <div class="section-content">{{usage}}</div>
      </div>
      <div class="section">
        <div class="section-title">命令列表</div>
        <div class="section-content">{{commands}}</div>
      </div>
    </div>
  </div>
</body>
</html>
